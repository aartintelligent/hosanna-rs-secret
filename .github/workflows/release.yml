# ─────────────────────────────────────────────────────────────────────────────
#  release — triggered by pushing a version tag `vX.Y.Z`.
#
#  Expected release flow (run locally before pushing the tag):
#    1.  `changie batch <X.Y.Z>`  — moves fragments from unreleased/ into
#                                    `.changes/<X.Y.Z>.md`.
#    2.  `changie merge`          — rebuilds top-level `CHANGELOG.md`.
#    3.  Bump `version` in `Cargo.toml` to X.Y.Z.
#    4.  Commit + push all three changes to `main`.
#    5.  `git tag vX.Y.Z && git push --tags`  — triggers this workflow.
#
#  The workflow itself is side-effect-only on publication. It does not
#  mutate the repo: any "preparation" belongs on `main` before tagging.
#
#  Migrating to OIDC trusted publishing: replace the `CARGO_REGISTRY_TOKEN`
#  env var on the publish step with `id-token: write` permission + the
#  `rust-lang/crates-io-auth-action` (or equivalent) once trusted
#  publishing is enabled for this crate on crates.io. No other changes.
# ─────────────────────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # needed to create the GitHub Release

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_ver=$(awk -F'"' '/^version[[:space:]]*=/ { print $2; exit }' Cargo.toml)
          if [[ "$tag" != "$cargo_ver" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_ver"
            echo "::error::Run 'cargo set-version $tag' (or edit Cargo.toml) before tagging."
            exit 1
          fi
          echo "Version confirmed: $cargo_ver"

      - name: Verify Changie batch file exists for this version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [[ ! -f ".changes/$tag.md" ]]; then
            echo "::error::Missing .changes/$tag.md"
            echo "::error::Run 'changie batch $tag' and 'changie merge' on main before tagging."
            exit 1
          fi
          echo "Release notes:"
          cat ".changes/$tag.md"

      - name: Re-run the full test matrix
        # Belt and braces: PR-time CI already ran these, but tags can be
        # pushed from any branch and we want certainty before publishing.
        run: |
          cargo test --locked
          cargo test --locked --no-default-features
          cargo test --locked --all-features

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "v$tag" \
            --notes-file ".changes/$tag.md"
