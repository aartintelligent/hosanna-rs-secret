# ─────────────────────────────────────────────────────────────────────────────
#  CI — the same gates the local pre-commit hook runs, enforced on every PR
#  and on every push to `main`.
# ─────────────────────────────────────────────────────────────────────────────
name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push supersedes them.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--no-deps` keeps the build fast; `RUSTDOCFLAGS: -D warnings` (above)
      # fails the job on broken intra-doc links or missing items.
      - run: cargo doc --all-features --no-deps --locked

  test:
    name: test (${{ matrix.toolchain }} / ${{ matrix.features.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.85"]
        features:
          - { name: default,      flags: "" }
          - { name: no-default,   flags: "--no-default-features" }
          - { name: all-features, flags: "--all-features" }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolchain }}-${{ matrix.features.name }}
      - run: cargo test --locked ${{ matrix.features.flags }}

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # Coverage is informational — a broken upload must not block the whole
    # pipeline (e.g. Codecov outage, missing token on a fork PR).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      # Source-based coverage via LLVM. `taiki-e/install-action` pulls the
      # pre-built `cargo-llvm-cov` binary — no `cargo install` compile wait.
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate lcov report
        run: cargo llvm-cov --all-features --workspace --locked --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
